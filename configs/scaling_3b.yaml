# ---------------------------------------------------------------
# qwen_swiglu_pruning — 3B scaling experiment config
# Run: python run_experiment.py --config configs/scaling_3b.yaml --scaling-recon
# ---------------------------------------------------------------

model_name: "Qwen/Qwen2.5-3B"
model_name_fallback: "Qwen/Qwen2.5-3B-Instruct"

device: "auto"
dtype: "float32"

# Scaling experiment settings
scaling_models:
  - "Qwen/Qwen2.5-3B"

scaling_alphas:
  - 0.001    # 1e-3
  - 0.002    # 2e-3
  - 0.003    # 3e-3
  - 0.005    # 5e-3

scaling_dtype: "auto"   # bfloat16 if supported, else float32

# Evaluation
reconstruction_eval_samples: 256
bound_analysis_eval_samples: 64
max_seq_len: 512
batch_size: 4

# Output
output_dir: "results"

# Dataset
eval_dataset: "wikitext"
use_fallback_corpus: false

# Reproducibility
seed: 42
