# ---------------------------------------------------------------
# Smoke: per_expert_mask + 2% + activation_score selector
#
# Uses activation-weighted channel importance scores:
#   score(layer, expert, ch) = mean_tokens |SiLU(X@G.T) * (X@U.T)|_ch * ||down[:, ch]||
# No score aggregation across experts (each expert scored independently).
#
#   python run_experiment.py \
#       --config configs/moe_smoke_per_expert_mask_2pct_activation_score.yaml \
#       --moe-target-pruning
# ---------------------------------------------------------------

device: "auto"
scaling_dtype: "auto"

scaling_models:
  - "Qwen/Qwen3-30B-A3B"

target_pruning_percents:
  - 2.0

scaling_methods:
  - "pure_delete"

max_expert_frac: 0.20
min_expert_tokens: 32
reconstruction_eval_samples: 64
max_seq_len: 512
batch_size: 1

eval_datasets:
  - "wikitext2"
use_fallback_corpus: false

output_dir: "results"
moe_smoke_test: true
moe_inplace_pruning: true
device_map: "auto"
moe_channel_alignment: 16
moe_same_channel_aggregation: "p95"
moe_pruning_mode: "per_expert_mask"

# Activation-based scoring — uses calibration tokens routed to each expert
moe_selector: "activation_score"

residual_lambda: 1.0e-2
residual_tau: 1.0
min_residual_tokens_per_expert: 16
solve_residual_on_cpu: true

seed: 42
