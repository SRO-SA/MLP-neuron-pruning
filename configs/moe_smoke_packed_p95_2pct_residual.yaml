# ---------------------------------------------------------------
# Smoke: packed_same_channel p95 + 2% + residual_full_moe
#
# Tests residual reconstruction for packed same-channel pruning.
# residual_full_moe runs ridge regression per expert (pre-pruning)
# to compensate for removed channels before the physical reshape.
#
#   python run_experiment.py \
#       --config configs/moe_smoke_packed_p95_2pct_residual.yaml \
#       --moe-target-pruning
# ---------------------------------------------------------------

device: "auto"
scaling_dtype: "auto"

scaling_models:
  - "Qwen/Qwen3-30B-A3B"

target_pruning_percents:
  - 2.0

scaling_methods:
  - "residual_full_moe"

max_expert_frac: 0.20
min_expert_tokens: 32
reconstruction_eval_samples: 64
max_seq_len: 512
batch_size: 1

eval_datasets:
  - "wikitext2"
use_fallback_corpus: false

output_dir: "results"
moe_smoke_test: true
moe_inplace_pruning: true
device_map: "auto"
moe_channel_alignment: 16
moe_same_channel_aggregation: "p95"
moe_pruning_mode: "packed_same_channel"
moe_selector: "rmsnorm_bound"

# Residual settings
residual_lambda: 1.0e-2
residual_tau: 1.0
min_residual_tokens_per_expert: 16
solve_residual_on_cpu: true

seed: 42
