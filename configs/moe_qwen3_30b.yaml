# ---------------------------------------------------------------
# qwen_swiglu_pruning — MoE expert-wise channel pruning
#
# Run (smoke test first):
#   python run_experiment.py \
#       --config configs/moe_qwen3_30b.yaml \
#       --moe-target-pruning
#
# WARNING: Qwen3-30B-A3B requires ~30-40 GB VRAM in bfloat16.
#   If OOM, reduce reconstruction_eval_samples and batch_size.
#   Set scaling_dtype: "float16" if bfloat16 is not supported.
# ---------------------------------------------------------------

device: "auto"
scaling_dtype: "auto"

scaling_models:
  - "Qwen/Qwen3-30B-A3B"

target_pruning_percents:
  - 2.0

# Methods: pure_delete first (no calibration), then residual variants
scaling_methods:
  - "pure_delete"
  # - "residual_full_moe"   # packed same-channel residual (needs calib)
  # - "residual_mask_moe"   # per-expert mask residual (needs calib)

max_expert_frac: 0.20
min_expert_tokens: 128
reconstruction_eval_samples: 64
max_seq_len: 512
batch_size: 1

eval_datasets:
  - "wikitext2"
use_fallback_corpus: false

output_dir: "results"
moe_smoke_test: true
moe_inplace_pruning: true
device_map: "auto"
moe_channel_alignment: 16
moe_same_channel_aggregation: "p95"
moe_pruning_mode: "packed_same_channel"

# Scoring selector:
#   rmsnorm_bound    : weight-only RMSNorm-bounded SwiGLU score (no calib needed)
#   activation_score : activation x down-column-norm score (uses calib data)
moe_selector: "rmsnorm_bound"

# Residual reconstruction (residual_full_moe / residual_mask_moe)
residual_lambda: 1.0e-2
residual_tau: 1.0
min_residual_tokens_per_expert: 16
solve_residual_on_cpu: true

seed: 42
