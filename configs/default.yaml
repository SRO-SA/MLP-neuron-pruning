# ---------------------------------------------------------------
# qwen_swiglu_pruning — default experiment configuration
# ---------------------------------------------------------------

model_name: "Qwen/Qwen2.5-0.5B"
model_name_fallback: "Qwen/Qwen2.5-0.5B-Instruct"

device: "auto"      # "auto" = CUDA if available, else CPU
dtype: "float32"    # "float32" | "float16" | "bfloat16"

# Pruning ratios for the MAIN experiment
# Use --debug-pruning to run the tiny-ratio diagnostic separately
pruning_ratios:
  - 0.0
  - 0.05
  - 0.10
  - 0.20
  - 0.30
  - 0.40

# Tiny ratios used automatically in --debug-pruning mode:
#   0.001, 0.005, 0.01, 0.02, 0.05

pruning_methods:
  - random
  - down_norm
  - product_norm
  - rmsnorm_bound_angle

# Evaluation
max_eval_samples: 512
max_seq_len: 512
batch_size: 4

# Output
output_dir: "results"

# Bound analysis mode (--bound-analysis / --bound-ppl-only)
# Uses a smaller eval set so the threshold experiments finish faster.
bound_analysis_eval_samples: 64

# Reconstruction modes (--reconstruction-merge / --reconstruction-best)
# Larger eval set for more reliable PPL estimates.
# 256 is a reasonable trade-off; raise to 512 for final results.
reconstruction_eval_samples: 256

# Scaling experiment (--scaling-recon)
# Models loaded one at a time; each deleted before the next.
# Add "Qwen/Qwen2.5-3B" or "Qwen/Qwen2.5-7B" once 0.5B and 1.5B are verified.
scaling_models:
  - "Qwen/Qwen2.5-0.5B"
  - "Qwen/Qwen2.5-1.5B"

scaling_alphas:
  - 0.0001   # 1e-4
  - 0.001    # 1e-3
  - 0.002    # 2e-3
  - 0.003    # 3e-3
  - 0.005    # 5e-3
  - 0.01     # 1e-2

# scaling_dtype: "auto"  (= bfloat16 if CUDA supports it, else float32)
# Override with "float32" or "float16" if needed.
scaling_dtype: "auto"

# Evaluation dataset
# eval_dataset: which dataset to use for perplexity evaluation.
#   Currently only "wikitext" (WikiText-2-raw-v1 test split) is supported.
eval_dataset: "wikitext"

# use_fallback_corpus: what to do when the eval dataset cannot be loaded.
#   false (recommended) — fail with an error so PPL numbers are trustworthy.
#   true               — silently fall back to a built-in 12-sample corpus
#                        (useful for offline/CI testing, but PPL is unreliable).
use_fallback_corpus: false

# Reproducibility
seed: 42
