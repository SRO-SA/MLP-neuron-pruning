# Full-48 benchmark: packed_same_channel + p95 + 8pct + residual_full_moe + c4 + n_eval=64
#   python run_experiment.py --config configs/moe_full48_packed_p95_8pct_residual_full_moe_c4_n64.yaml --moe-target-pruning

device: "auto"
scaling_dtype: "auto"
scaling_models:
  - "Qwen/Qwen3-30B-A3B"
max_expert_frac: 0.20
min_expert_tokens: 32
max_seq_len: 512
batch_size: 1
use_fallback_corpus: false
output_dir: "results"
moe_smoke_test: false
moe_inplace_pruning: true
device_map: "auto"
moe_channel_alignment: 16
moe_same_channel_aggregation: "p95"
moe_pruning_mode: "packed_same_channel"
moe_selector: "rmsnorm_bound"
moe_max_layer_channel_prune_frac: 0.10
seed: 42

target_pruning_percents:
  - 8.0

scaling_methods:
  - "residual_full_moe"

eval_datasets:
  - "c4"

reconstruction_eval_samples: 64

moe_calib_samples: 512
